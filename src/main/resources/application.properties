spring.application.name=d11n

d11n.spaces-base-dir=${user.home}/d11n-spaces
d11n.default-author=d11n
d11n.default-email=d11n@localhost

# Database — H2 file-based in app working directory (d11n-db.mv.db)
spring.datasource.url=jdbc:h2:file:./d11n-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# Heartbeat — frontend polls /api/health to detect backend availability
d11n.heartbeat.interval-seconds=30
d11n.heartbeat.timeout-ms=5000

# JWT — CHANGE THIS IN PRODUCTION (generate with: openssl rand -base64 32)
d11n.security.jwt.secret=ZDExbi1kZWZhdWx0LXNlY3JldC1jaGFuZ2UtaW4tcHJvZHVjdGlvbiE=
d11n.security.jwt.expiration-hours=24

# Superuser (break-glass account) — synced from config on every startup.
# Leave password blank to disable. In prod set via env var: D11N_SUPERUSER_PASSWORD=secret
# d11n.superuser.username=superuser
# d11n.superuser.email=superuser@localhost
# d11n.superuser.password=${D11N_SUPERUSER_PASSWORD:}

# SSO Provider — uncomment and fill in to enable (requires oauth2-client dependency)
# spring.security.oauth2.client.registration.google.client-id=
