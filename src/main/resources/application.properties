spring.application.name=d11n

# H2 (dev)
spring.datasource.url=jdbc:h2:mem:d11n;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT — override in production via environment variable APP_JWT_SECRET
app.jwt.secret=d11n-development-secret-key-replace-in-production-minimum-256-bits
app.jwt.expiration-ms=86400000

# Superuser — override in production
app.superuser.email=admin@d11n.local
app.superuser.password=admin
